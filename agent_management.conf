#   Version 10.4.0
# DO NOT EDIT THIS FILE!
# Changes to default files will be lost on update and are difficult to
# manage and support.
#
# Please make any changes to system defaults by overriding them in
# apps or $SPLUNK_HOME/etc/system/local
# (See "Configuration file precedence" in the Splunk documentation).
#
# To override a specific setting, copy the name of the stanza and
# setting to the file where you wish to override it.
#
# This file configures agent management feature.

[general]
request_timeout = 5m
repository_type = database

[search_client]
polling_interval = 500ms

[splunkd_client]
connection_pool_size = 10
request_timeout = 285s
connection_keep_alive = 11s

[settings_sync]
polling_interval = 5m

[effective_configuration]
max_size = 16
cleanup_threshold = 6144
cleanup_schedule = 0 3 * * *

[telemetry]
enabled = true
cron_schedule = 15 3 * * *
collection_timeout = 10m
job_timeout = 5m

[repository_database]
agents_matching_refresh_batch_size = 10000
agents_matching_refresh_interval_s = 60
database_prune_interval_h = 24
database_items_ttl_h = 744
app_events_file_limit = 10
app_events_ingestion_interval_m = 1
app_events_ingestion_batch_size = 10000
client_events_file_limit = 10
client_events_ingestion_interval_m = 1
client_events_ingestion_batch_size = 10000
phonehome_events_file_limit = 10
phonehome_events_ingestion_interval_m = 1
phonehome_events_ingestion_batch_size = 10000
stale_csv_cleanup_interval_m = 60
stale_csv_cleanup_ttl_m = 10080
